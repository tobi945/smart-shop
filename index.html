<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2E7D32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Shop">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>Smart Shop 🛒</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── App Header ───────────────────────────────── -->
  <header class="app-header">
    <div class="header-row">
      <h1 class="app-title">🛒 Smart Shop</h1>
      <button class="btn-add-header" id="btnOpenModal">+ הוסף פריט</button>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </header>

  <!-- ── Main Content ─────────────────────────────── -->
  <main class="main-content" id="categoriesContainer">
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">🛍️</span>
      <p class="empty-title">הרשימה ריקה</p>
      <p class="empty-hint">לחץ על "הוסף פריט" כדי להתחיל</p>
    </div>
  </main>

  <!-- ── FAB: WhatsApp ─────────────────────────────── -->
  <button class="fab-btn" id="fabWhatsApp" aria-label="שלח לוואטסאפ">
    <span class="fab-icon">📲</span>
    <span class="fab-text">שלח לוואטסאפ</span>
  </button>

  <!-- ── Add Product Modal ─────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="modalTitle">הוסף פריט חדש</h2>
        <button class="modal-close" id="modalClose" aria-label="סגור">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="productName">שם המוצר</label>
          <input type="text" id="productName"
                 placeholder="לדוגמה: חלב, לחם, עגבניות..."
                 autocomplete="off" inputmode="text">
        </div>
        <div class="form-group">
          <label for="categorySelect">קטגוריה</label>
          <select id="categorySelect"></select>
        </div>
        <div class="form-group" id="newCategoryGroup" style="display:none">
          <label for="newCategoryName">שם הקטגוריה החדשה</label>
          <input type="text" id="newCategoryName"
                 placeholder="לדוגמה: מוצרי ספורט..." autocomplete="off">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">ביטול</button>
        <button class="btn-save" id="btnSave">הוסף ✓</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
